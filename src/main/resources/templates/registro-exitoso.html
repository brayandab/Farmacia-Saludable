<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro Exitoso</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #e8f5e9;
            color: #1675b4;
            text-align: center;
            padding-top: 50px;
        }

        .card {
            background-color: white;
            max-width: 500px;
            margin: auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }

        h1 {
            color: #1675b4;
        }

        p {
            font-size: 18px;
        }

        a {
            transition: 0.5ms;
            margin-top: 20px;
            display: inline-block;
            text-decoration: none;
            color: white;
            background-color: #0d64b4;
            padding: 10px 20px;
            border-radius: 6px;
            transition: background-color 0.5s ease;
        }

        a:hover {
            background-color: #2682d8;
        }

    </style>
</head>
<body>
<div class="card">
    <h1>🎉 ¡Registro Completado!</h1>
    <p>Gracias por registrarte, <strong th:text="${nombre}"></strong></p>
    <p>Te hemos registrado con el correo: <strong th:text="${correo}"></strong></p>
    <a href="login.html"> Iniciar sesión</a>

</div>
</body>
</html>

</body>
</html>

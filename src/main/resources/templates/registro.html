<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="UTF-8">
    <title>Registro de Usuario</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
        }

        .titulo-principal {
            font-size: 32px;
            color: #007bff;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .registro-container {
            background: white;
            padding: 30px 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 350px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #007bff;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        p {
            text-align: center;
            margin-top: 15px;
        }

        a {
            color: #007bff;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .material-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            /* centra el contenido dentro del botón */
            background: white;
            color: #3c4043;
            border: 1px solid #dadce0;
            border-radius: 24px;
            font-size: 14px;
            font-family: "Roboto", sans-serif;
            padding: 10px 20px;
            cursor: pointer;
            transition: background-color 0.4s ease;
            text-decoration: none;
            font-weight: bold;
            max-width: 300px;
            margin: 0 auto;
            /* CENTRA el botón */
        }

        .material-btn:hover {
            background-color: #cac9c9;
        }

        .material-btn .icon img {
            height: 18px;
            margin-right: 10px;
        }

        .separator {
            display: flex;
            align-items: center;
            text-align: center;
            color: #555;
            margin: 20px 0;
        }

        .separator::before,
        .separator::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid #ccc;
        }

        .separator::before {
            margin-right: 10px;
        }

        .separator::after {
            margin-left: 10px;
        }
    </style>
</head>

<body>

    <div class="titulo-principal">Farmacia Saludable</div>

    <div class="registro-container">
        <h2>Formulario de Registro</h2>

        <!-- ALERTA SI EL CORREO YA EXISTE -->
        <div th:if="${correoExistente}" style="color: red; text-align: center; font-weight: bold; margin-bottom: 15px;">
            El correo ingresado ya está registrado. Por favor, intente con una dirección de correo diferente.
        </div>

        <form action="/basico" method="POST">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" name="nombre" required>

            <label for="apellido">Apellido</label>
            <input type="text" id="apellido" name="apellido" required>

            <label for="correo">Correo</label>
            <input type="email" id="correo" name="correo" required>

            <label for="contraseña">Contraseña</label>
            <input type="password" id="contraseña" name="contraseña" required>

            <button type="submit">Registrarse</button>

            <div class="separator">
                <span>Ó</span>
            </div>

            <a.2 href="/login/oauth2/authorization/google">
                <button class="material-btn">
                    <span class="icon">
                        <img src="https://img.icons8.com/?size=100&id=V5cGWnc9R4xj&format=png&color=000000">
                    </span>
                    <span class="text">Registrarse con Google</span>
                </button>
            </a.2>
        </form>

        <p>¿Ya tiene cuenta? <a href=login.html>Iniciar sesión </a></p>
    </div>

</body>

</html>
